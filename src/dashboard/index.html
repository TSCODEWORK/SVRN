<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVRN</title>
<script src="/static/marked.min.js"></script>
<style>
:root {
  --bg:         #f0ebe2;
  --card:       rgba(22,15,8,0.92);
  --card-b:     rgba(255,255,255,0.07);
  --text-on-bg: #2c1a0e;
  --dim-on-bg:  #7a5c42;
  --text-card:  #f5f0e8;
  --dim-card:   rgba(245,240,232,0.5);
  --accent:     #5b8dee;
  --green:      #34d399;
  --red:        #f87171;
  --font: -apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Helvetica,Arial,sans-serif;
  --mono: 'SF Mono','JetBrains Mono','Fira Code',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--text-on-bg);overflow-x:hidden;}

/* ── Topographic background ── */
.topo-bg{
  position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
  background:url('/static/topo-bg.png') center center / cover no-repeat;
  filter:blur(2.5px);
  transform:scale(1.02);
  opacity:0.72;
}

/* ── Shell ── */
.shell{
  position:relative;z-index:1;
  max-width:960px;margin:0 auto;
  padding:52px 32px 130px;
  min-height:100vh;
}

/* ── Greeting ── */
.greeting-wrap{
  text-align:center;margin-bottom:44px;
  animation:fadeSlide .6s ease both;
}
@keyframes fadeSlide{from{opacity:0;transform:translateY(-14px);}to{opacity:1;transform:none;}}
.greeting-text{
  font-size:clamp(28px,5vw,42px);font-weight:700;
  letter-spacing:-.02em;color:var(--text-on-bg);line-height:1.1;
}
.greeting-sub{margin-top:8px;font-size:13px;color:var(--dim-on-bg);letter-spacing:.06em;}

/* ── Widget row ── */
.widget-row{
  display:grid;grid-template-columns:repeat(3,1fr);gap:16px;
  margin-bottom:44px;animation:fadeSlide .65s .07s ease both;
}
@media(max-width:640px){.widget-row{grid-template-columns:1fr;}}

.widget{
  background:var(--card);border:1px solid var(--card-b);border-radius:22px;
  padding:22px 22px 20px;color:var(--text-card);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  box-shadow:0 8px 32px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.07);
  transition:transform .2s,box-shadow .2s;
}
.widget:hover{transform:translateY(-2px);box-shadow:0 14px 44px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.10);}
.widget-title{font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--dim-card);font-weight:600;margin-bottom:16px;}
.wrows{display:flex;flex-direction:column;gap:10px;}
.wrow{display:flex;justify-content:space-between;align-items:center;}
.wlbl{font-size:12px;color:var(--dim-card);}
.wval{font-size:14px;font-weight:600;color:var(--text-card);}
.w-prog-bg{height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:14px;}
.w-prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#5b8dee,#a78bfa);transition:width .6s ease;}
.sdot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--dim-card);margin-right:6px;vertical-align:middle;flex-shrink:0;}
.sdot.up{background:var(--green);box-shadow:0 0 0 3px rgba(52,211,153,.2);}
.sdot.down{background:var(--red);}

/* ── App section ── */
.apps-label{
  font-size:10.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--dim-on-bg);
  margin-bottom:20px;font-weight:600;animation:fadeSlide .7s .12s ease both;
}
.app-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(104px,1fr));
  gap:10px 4px;animation:fadeSlide .7s .15s ease both;
}

/* ── App tile ── */
.app-tile{
  display:flex;flex-direction:column;align-items:center;gap:9px;
  padding:10px 6px;border-radius:18px;cursor:pointer;
  transition:transform .16s cubic-bezier(.34,1.56,.64,1),background .12s;
  -webkit-user-select:none;user-select:none;
}
.app-tile:hover{transform:translateY(-6px);background:rgba(44,26,14,.06);}
.app-tile:active{transform:scale(.91);}
.app-icon{
  width:72px;height:72px;border-radius:17px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 5px 20px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.2);
  flex-shrink:0;transition:box-shadow .15s;
}
.app-tile:hover .app-icon{box-shadow:0 10px 32px rgba(0,0,0,.32),inset 0 1px 0 rgba(255,255,255,.24);}
.app-name{font-size:11.5px;font-weight:500;color:var(--text-on-bg);text-align:center;line-height:1.25;max-width:88px;}
.app-icon-wrap{position:relative;display:inline-flex;}
.app-status-dot{
  position:absolute;bottom:3px;right:3px;width:10px;height:10px;
  border-radius:50%;border:2px solid var(--bg);background:var(--dim-on-bg);
}
.app-status-dot.up{background:var(--green);}
.app-status-dot.down{background:var(--red);}

/* ── Dock ── */
.dock{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:300;pointer-events:none;animation:dockIn .5s .2s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes dockIn{from{opacity:0;transform:translateX(-50%) translateY(30px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.dock-inner{pointer-events:all;display:flex;align-items:center;gap:4px;background:rgba(22,15,8,.88);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border:1px solid rgba(255,255,255,.1);border-radius:26px;padding:10px 14px;box-shadow:0 8px 40px rgba(0,0,0,.32),inset 0 1px 0 rgba(255,255,255,.08);}
.dock-sep{width:1px;height:32px;background:rgba(255,255,255,.12);margin:0 4px;}
.dock-btn{width:50px;height:50px;border-radius:14px;border:none;background:transparent;color:rgba(245,240,232,.6);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s,transform .12s;position:relative;}
.dock-btn:hover{background:rgba(255,255,255,.12);color:#f5f0e8;transform:translateY(-3px);}
.dock-btn:active{transform:scale(.9);}
.dock-btn.active{background:rgba(255,255,255,.14);color:#f5f0e8;}
.dock-btn svg{width:22px;height:22px;}
.dock-badge{position:absolute;top:4px;right:4px;min-width:16px;height:16px;background:var(--red);border-radius:8px;border:2px solid rgba(22,15,8,.88);font-size:9px;font-weight:700;color:#fff;display:none;align-items:center;justify-content:center;padding:0 3px;}
.dock-badge.show{display:flex;}

/* ── Chat panel ── */
.chat-panel{position:fixed;bottom:90px;right:24px;z-index:200;width:min(440px,calc(100vw - 40px));height:min(580px,calc(100vh - 130px));background:rgba(18,12,6,.96);border:1px solid rgba(255,255,255,.1);border-radius:20px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 12px 60px rgba(0,0,0,.45);transform:scale(.9) translateY(20px);transform-origin:bottom right;opacity:0;pointer-events:none;transition:transform .22s cubic-bezier(.34,1.56,.64,1),opacity .18s;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);}
.chat-panel.open{transform:scale(1) translateY(0);opacity:1;pointer-events:all;}
.chat-panel-header{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0;}
.chat-panel-title{font-size:12px;font-weight:700;letter-spacing:.12em;color:#f5f0e8;flex:1;text-transform:uppercase;}
.model-select{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#f5f0e8;font-family:var(--font);font-size:11px;padding:5px 10px;outline:none;cursor:pointer;max-width:150px;}
.model-select option{background:#160f06;color:#f5f0e8;}
.panel-close{background:none;border:none;cursor:pointer;color:rgba(245,240,232,.45);display:flex;align-items:center;padding:4px;border-radius:8px;transition:color .12s,background .12s;}
.panel-close:hover{color:#f5f0e8;background:rgba(255,255,255,.08);}
.chat-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent;}
.msg{display:flex;flex-direction:column;gap:4px;max-width:88%;}
.msg.user{align-self:flex-end;align-items:flex-end;}
.msg.ai{align-self:flex-start;align-items:flex-start;}
.msg-bubble{padding:10px 14px;border-radius:14px;font-size:13.5px;line-height:1.65;font-family:var(--font);}
.msg.user .msg-bubble{background:#5b8dee;color:#fff;border-radius:14px 14px 3px 14px;}
.msg.ai .msg-bubble{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:#f5f0e8;border-radius:14px 14px 14px 3px;}
.msg.ai .msg-bubble p{margin:.35em 0;line-height:1.7;}
.msg.ai .msg-bubble p:first-child{margin-top:0;}
.msg.ai .msg-bubble p:last-child{margin-bottom:0;}
.msg.ai .msg-bubble h1,.msg.ai .msg-bubble h2,.msg.ai .msg-bubble h3{font-size:14px;font-weight:700;margin:.5em 0 .25em;color:#f5f0e8;}
.msg.ai .msg-bubble code{font-family:var(--mono);font-size:12px;background:rgba(255,255,255,.12);padding:2px 5px;border-radius:4px;}
.msg.ai .msg-bubble pre{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 14px;margin:.5em 0;overflow-x:auto;font-size:12px;}
.msg.ai .msg-bubble pre code{background:none;padding:0;}
.msg.ai .msg-bubble ul,.msg.ai .msg-bubble ol{padding-left:1.3em;margin:.35em 0;}
.msg.ai .msg-bubble a{color:#93c5fd;text-decoration:underline;text-underline-offset:3px;}
.msg-label{font-size:10px;color:rgba(245,240,232,.32);letter-spacing:.08em;}
.typing-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:rgba(245,240,232,.4);margin:0 2px;animation:blink 1.2s infinite;}
.typing-dot:nth-child(2){animation-delay:.2s;}.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.2;}40%{opacity:1;}}
.chat-suggestions{display:flex;flex-wrap:wrap;gap:6px;padding:10px 14px 2px;flex-shrink:0;}
.suggestion-chip{font-family:var(--font);font-size:11px;padding:5px 11px;border-radius:20px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(245,240,232,.6);cursor:pointer;white-space:nowrap;transition:background .12s,color .12s;}
.suggestion-chip:hover{background:rgba(255,255,255,.15);color:#f5f0e8;}
.chat-input-row{display:flex;gap:8px;padding:12px 14px;border-top:1px solid rgba(255,255,255,.08);flex-shrink:0;}
#chat-input{flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:12px;color:#f5f0e8;font-family:var(--font);font-size:14px;padding:10px 14px;resize:none;outline:none;max-height:120px;overflow-y:auto;line-height:1.5;}
#chat-input::placeholder{color:rgba(245,240,232,.28);}
#chat-input:focus{border-color:rgba(91,141,238,.55);}
.send-btn{background:#5b8dee;border:none;border-radius:12px;color:#fff;padding:10px 16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:opacity .12s,transform .12s;}
.send-btn:hover{opacity:.88;transform:scale(1.04);}
.send-btn:disabled{opacity:.3;cursor:default;transform:none;}
</style>
</head>
<body>

<div class="topo-bg"></div>

<div class="shell">

  <div class="greeting-wrap">
    <h1 class="greeting-text" id="greeting-text">Good morning.</h1>
    <p class="greeting-sub">SVRN · Offline Command Center</p>
  </div>

  <div class="widget-row">
    <div class="widget">
      <div class="widget-title">System</div>
      <div class="wrows">
        <div class="wrow"><span class="wlbl">CPU</span><span class="wval" id="w-cpu">—</span></div>
        <div class="wrow"><span class="wlbl">Memory</span><span class="wval" id="w-ram">—</span></div>
        <div class="wrow"><span class="wlbl">Power</span><span class="wval" id="w-pwr">—</span></div>
      </div>
    </div>

    <div class="widget">
      <div class="widget-title">Storage</div>
      <div class="wrows">
        <div class="wrow"><span class="wlbl">Vault</span><span class="wval" id="w-vault-val">—</span></div>
        <div class="wrow"><span class="wlbl">Libraries</span><span class="wval" id="w-zim-count">—</span></div>
        <div class="wrow"><span class="wlbl">Maps</span><span class="wval" id="w-map-count">—</span></div>
      </div>
      <div class="w-prog-bg"><div class="w-prog-fill" id="w-vault-prog" style="width:0%"></div></div>
    </div>

    <div class="widget">
      <div class="widget-title">AI</div>
      <div class="wrows">
        <div class="wrow"><span class="wlbl">Ollama</span><span class="wval" id="w-ollama-status"><span class="sdot" id="w-ollama-dot"></span>—</span></div>
        <div class="wrow"><span class="wlbl">Models</span><span class="wval" id="w-model-count">—</span></div>
        <div class="wrow"><span class="wlbl">Active</span><span class="wval" id="w-active-model" style="font-size:12px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">—</span></div>
      </div>
    </div>
  </div>

  <div class="apps-label">Applications</div>
  <div class="app-grid" id="app-grid"></div>
</div>

<!-- Chat panel -->
<div class="chat-panel" id="chat-panel">
  <div class="chat-panel-header">
    <div class="chat-panel-title">AI Assistant</div>
    <select class="model-select" id="model-select"></select>
    <button class="panel-close" onclick="toggleChat()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="chat-suggestions" id="chat-suggestions">
    <button class="suggestion-chip" onclick="sendSuggestion(this)">What's on my vault?</button>
    <button class="suggestion-chip" onclick="sendSuggestion(this)">How do I download a map?</button>
    <button class="suggestion-chip" onclick="sendSuggestion(this)">What models are installed?</button>
    <button class="suggestion-chip" onclick="sendSuggestion(this)">What can SVRN do?</button>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-input-row">
    <textarea id="chat-input" rows="1" placeholder="Ask anything…"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendChat()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<!-- Bottom dock -->
<nav class="dock">
  <div class="dock-inner">
    <button class="dock-btn active" title="Home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
    </button>
    <button class="dock-btn" id="dock-chat" title="AI Chat" onclick="toggleChat()">
      <div class="dock-badge" id="dock-badge"></div>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </button>
    <div class="dock-sep"></div>
    <button class="dock-btn" title="Library" onclick="window.open('/library','_blank')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    </button>
    <button class="dock-btn" title="Maps" onclick="window.open('/maps','_blank')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
    </button>
    <button class="dock-btn" title="Notes" onclick="window.open('/notes','_blank')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    </button>
    <div class="dock-sep"></div>
    <button class="dock-btn" title="Settings" onclick="window.open('/settings','_blank')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
</nav>

<script>
const APPS = [
  {
    id:'ollama', title:'AI Chat', action:'page', url:'/chat', port:11434,
    g1:'#7c3aed', g2:'#3b1070',
    icon:`<svg viewBox="0 0 24 24" width="36" height="36">
      <polygon points="12,3 15.5,7.5 15.5,12.5 12,15 8.5,12.5 8.5,7.5" fill="white"/>
      <circle cx="5.5" cy="19" r="2.5" fill="rgba(255,255,255,0.78)"/>
      <circle cx="18.5" cy="19" r="2.5" fill="rgba(255,255,255,0.78)"/>
      <line x1="8.8" y1="14.2" x2="6.8" y2="17" stroke="rgba(255,255,255,0.55)" stroke-width="1.7"/>
      <line x1="15.2" y1="14.2" x2="17.2" y2="17" stroke="rgba(255,255,255,0.55)" stroke-width="1.7"/>
      <line x1="7.9" y1="19" x2="16.1" y2="19" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
    </svg>`
  },
  {
    id:'wikipedia', title:'Wikipedia', action:'page', url:'/wikipedia', port:null,
    g1:'#1f2937', g2:'#0a0f18',
    icon:`<svg viewBox="0 0 24 24" width="36" height="36">
      <circle cx="12" cy="12" r="9.5" fill="none" stroke="white" stroke-width="1.8"/>
      <polyline points="5,7.5 8,17 12,10.5 16,17 19,7.5" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`
  },
  {
    id:'medical', title:'Medical', action:'page', url:'/medical', port:null,
    g1:'#b91c1c', g2:'#500a0a',
    icon:`<svg viewBox="0 0 24 24" width="36" height="36">
      <rect x="9" y="3" width="6" height="18" rx="2.5" fill="white"/>
      <rect x="3" y="9" width="18" height="6" rx="2.5" fill="white"/>
    </svg>`
  },
  {
    id:'maps', title:'Offline Maps', action:'page', url:'/maps', port:null,
    g1:'#047857', g2:'#022c20',
    icon:`<svg viewBox="0 0 24 24" width="36" height="36">
      <path d="M12 2C8.13 2 5 5.13 5 9c0 5.12 6.24 11.6 7 12.85C12.76 20.6 19 14.12 19 9c0-3.87-3.13-7-7-7z" fill="white"/>
      <circle cx="12" cy="9" r="3" fill="rgba(4,120,87,0.75)"/>
    </svg>`
  },
  {
    id:'education', title:'Education', action:'page', url:'/education', port:null,
    g1:'#b45309', g2:'#451a03',
    icon:`<svg viewBox="0 0 24 24" width="36" height="36">
      <polygon points="12,4 2,10.5 12,17 22,10.5" fill="white"/>

let svcStatus    = {};
let chatHistory  = [];
let streaming    = false;
let panelOpen    = false;
let modelsLoaded = false;
let unreadCount  = 0;
let _vaultCtx    = null;

function updateGreeting() {
  const h = new Date().getHours();
  const period = h < 5 ? 'night' : h < 12 ? 'morning' : h < 17 ? 'afternoon' : 'evening';
  document.getElementById('greeting-text').textContent = `Good ${period}.`;
}

function buildGrid() {
  const grid = document.getElementById('app-grid');
  grid.innerHTML = '';
  APPS.forEach(app => {
    const up = app.port === null ? null : svcStatus[app.port];
    const dotCls = up === true ? 'up' : up === false ? 'down' : '';
    const tile = document.createElement('div');
    tile.className = 'app-tile';
    tile.innerHTML = `
      <div class="app-icon-wrap">
        <div class="app-icon" style="background:linear-gradient(145deg,${app.g1},${app.g2})">${app.icon}</div>
        ${app.port !== null ? `<div class="app-status-dot ${dotCls}"></div>` : ''}
      </div>
      <div class="app-name">${app.title}</div>`;
    tile.addEventListener('click', () => window.open(app.url, '_blank'));
    grid.appendChild(tile);
  });
}

async function pollStatus() {
  try {
    const data = await fetch('/api/services').then(r => r.json());
    data.forEach(s => { if (s.port) svcStatus[s.port] = s.up; });
    buildGrid();
  } catch {}
}

async function pollSystem() {
  try {
    const [sys, vault] = await Promise.all([
      fetch('/api/system').then(r => r.json()),
      fetch('/api/vault').then(r => r.json()),
    ]);
    document.getElementById('w-cpu').textContent = sys.cpu_pct != null ? sys.cpu_pct + '%' : '—';
    document.getElementById('w-ram').textContent = sys.ram_used_gb != null ? sys.ram_used_gb + ' / ' + sys.ram_total_gb + ' GB' : '—';
    document.getElementById('w-pwr').textContent = sys.power_source === 'AC' ? '⚡ AC Power' : sys.battery_pct != null ? '🔋 ' + sys.battery_pct + '%' : '—';
    if (vault.connected) {
      _vaultCtx = vault;
      const zims = vault.zims_all || [];
      const maps = vault.maps     || [];
      document.getElementById('w-vault-val').textContent  = vault.free_gb + ' GB free';
      document.getElementById('w-zim-count').textContent  = zims.length + (zims.length === 1 ? ' library' : ' libraries');
      document.getElementById('w-map-count').textContent  = maps.length + (maps.length === 1 ? ' map' : ' maps');
      document.getElementById('w-vault-prog').style.width = (vault.used_pct || 0) + '%';
    } else {
      _vaultCtx = null;
      document.getElementById('w-vault-val').textContent = 'Not connected';
      document.getElementById('w-zim-count').textContent = '—';
      document.getElementById('w-map-count').textContent = '—';
    }
  } catch {}
}

async function pollAI() {
  try {
    const data = await fetch('/api/chat/models').then(r => r.json());
    const models = data.models || [];
    document.getElementById('w-ollama-dot').className    = 'sdot up';
    document.getElementById('w-ollama-status').innerHTML = '<span class="sdot up"></span>Online';
    document.getElementById('w-model-count').textContent = models.length + (models.length === 1 ? ' model' : ' models');
    document.getElementById('w-active-model').textContent = data.preferred ? data.preferred.replace(':latest','') : (models[0] ? models[0].replace(':latest','') : '—');
    if (!modelsLoaded && models.length) {
      document.getElementById('model-select').innerHTML =
        models.map(m => `<option value="${m}">${m.replace(':latest','')}</option>`).join('');
      modelsLoaded = true;
    }
  } catch {
    document.getElementById('w-ollama-dot').className    = 'sdot down';
    document.getElementById('w-ollama-status').innerHTML = '<span class="sdot down"></span>Offline';
    document.getElementById('w-model-count').textContent = '—';
    document.getElementById('w-active-model').textContent = '—';
  }
}

/* ── Chat panel ── */
function toggleChat() {
  panelOpen = !panelOpen;
  document.getElementById('chat-panel').classList.toggle('open', panelOpen);
  const btn = document.getElementById('dock-chat');
  if (panelOpen) {
    btn.classList.add('active');
    unreadCount = 0;
    document.getElementById('dock-badge').classList.remove('show');
    if (!modelsLoaded) pollAI();
    setTimeout(() => document.getElementById('chat-input').focus(), 240);
    if (chatHistory.length > 0) document.getElementById('chat-suggestions').style.display = 'none';
  } else {
    btn.classList.remove('active');
  }
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

(function(){
  if (typeof marked === 'undefined') return;
  const r = new marked.Renderer();
  r.link = function({ href, title, tokens }) {
    return `<a href="${href}" target="_blank" rel="noopener"${title?' title="'+title+'"':''}>${this.parser.parseInline(tokens)}</a>`;
  };
  marked.setOptions({ breaks:true, gfm:true, renderer:r });
})();

function renderMd(t) {
  return typeof marked !== 'undefined' ? marked.parse(t)
    : esc(t).replace(/\n/g,'<br>');
}

function appendMsg(role, text, isTyping=false) {
  const msgs = document.getElementById('chat-messages');
  const div  = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'user' : 'ai');
  const lbl = role === 'user' ? 'YOU' : 'SVRN AI';
  div.innerHTML = isTyping
    ? `<div class="msg-label">${lbl}</div><div class="msg-bubble"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>`
    : `<div class="msg-label">${lbl}</div><div class="msg-bubble">${role==='user' ? esc(text) : renderMd(text)}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div.querySelector('.msg-bubble');
}

function sendSuggestion(btn) {
  document.getElementById('chat-input').value = btn.textContent;
  document.getElementById('chat-suggestions').style.display = 'none';
  sendChat();
}

async function sendChat() {
  if (streaming) return;
  const input = document.getElementById('chat-input');
  const text  = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = 'auto';
  document.getElementById('chat-suggestions').style.display = 'none';
  chatHistory.push({ role:'user', content:text });
  appendMsg('user', text);
  streaming = true;
  document.getElementById('send-btn').disabled = true;
  const bubble = appendMsg('ai', '', true);
  let full = '';
  try {
    const model = document.getElementById('model-select').value;
    const resp  = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model, messages: chatHistory.slice(-20) }),
    });
    if (!resp.ok) throw new Error(await resp.text());
    const reader = resp.body.getReader();
    const dec    = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      dec.decode(value).split('\n').filter(Boolean).forEach(line => {
        if (line === 'data: [DONE]') return;
        if (line.startsWith('data: ')) {
          try {
            const chunk = JSON.parse(line.slice(6));
            full += chunk.text || '';
            bubble.innerHTML = renderMd(full);
            document.getElementById('chat-messages').scrollTop = 1e9;
          } catch {}
        }
      });
    }
    chatHistory.push({ role:'assistant', content:full });
    if (!panelOpen) {
      unreadCount++;
      const b = document.getElementById('dock-badge');
      b.textContent = unreadCount > 9 ? '9+' : unreadCount;
      b.classList.add('show');
    }
  } catch(e) {
    bubble.innerHTML = `<span style="color:#f87171">⚠ ${esc(e.message)}</span>`;
  }
  streaming = false;
  document.getElementById('send-btn').disabled = false;
}

document.getElementById('chat-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && panelOpen) toggleChat();
});

/* ── Init ── */
updateGreeting();
buildGrid();
pollStatus();
pollSystem();
pollAI();
setInterval(pollStatus, 12000);
setInterval(pollSystem, 18000);
setInterval(pollAI,     30000);
</script>
