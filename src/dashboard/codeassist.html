<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVRN · Code Assistant</title>
<link rel="stylesheet" href="/static/highlight-dark.min.css">
<style>
:root {
  --bg:#1a1a1e; --bg2:#232326; --bg3:#2c2c30; --bg4:#35353a;
  --border:#3a3a3f; --text:#d4d4d8; --dim:#71717a; --hi:#fafafa;
  --accent:#3b82f6; --accent2:#60a5fa;
  --green:#22c55e; --red:#ef4444; --amber:#f59e0b; --purple:#a78bfa;
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;
  --mono:'JetBrains Mono','SF Mono','Fira Code','Cascadia Code',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;overflow:hidden;}

/* ── Layout ── */
.app{display:flex;flex-direction:column;height:100vh;}

header{
  display:flex;align-items:center;gap:12px;padding:0 16px;height:48px;
  background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;
  z-index:10;
}
.back{color:var(--dim);text-decoration:none;font-size:13px;white-space:nowrap;}
.back:hover{color:var(--hi);}
.page-title{font-size:14px;font-weight:700;letter-spacing:.1em;color:var(--hi);}
.badge{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--accent);color:#fff;font-weight:700;letter-spacing:.08em;}

.hdr-center{flex:1;display:flex;align-items:center;gap:10px;justify-content:center;}
.model-wrap{display:flex;align-items:center;gap:8px;}
.model-lbl{font-size:12px;color:var(--dim);}
select.model-select{
  font-family:var(--font);font-size:13px;font-weight:500;
  background:var(--bg3);color:var(--hi);border:1px solid var(--border);
  border-radius:7px;padding:5px 10px;cursor:pointer;outline:none;
}
select.model-select:focus{border-color:var(--accent);}

.hdr-right{display:flex;align-items:center;gap:8px;margin-left:auto;}
.btn-sm{
  font-family:var(--font);font-size:12px;font-weight:500;
  padding:5px 12px;border-radius:6px;border:1px solid var(--border);
  background:var(--bg3);color:var(--text);cursor:pointer;
  transition:background .12s;white-space:nowrap;
}
.btn-sm:hover{background:var(--bg4);}
.btn-sm.accent{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-sm.accent:hover{opacity:.88;}
.btn-sm.danger{color:var(--red);border-color:rgba(239,68,68,.3);}
.btn-sm.danger:hover{background:var(--red);color:#fff;}

.workspace{display:flex;flex:1;overflow:hidden;}

/* ── Left: File Editor ── */
.editor-pane{
  width:42%;min-width:260px;max-width:60%;
  display:flex;flex-direction:column;
  border-right:1px solid var(--border);flex-shrink:0;
  position:relative;
}

.file-bar{
  display:flex;align-items:center;gap:6px;padding:8px 10px;
  border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;
}
.file-path{
  flex:1;font-family:var(--mono);font-size:12px;
  background:var(--bg3);border:1px solid var(--border);border-radius:6px;
  padding:5px 10px;color:var(--hi);outline:none;
}
.file-path:focus{border-color:var(--accent);}
.file-path::placeholder{color:var(--dim);}

.editor-toolbar{
  display:flex;align-items:center;gap:6px;padding:6px 10px;
  border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;
  flex-wrap:wrap;
}
.file-meta{font-size:11px;color:var(--dim);margin-left:auto;}

.editor-area{flex:1;position:relative;overflow:hidden;}
.line-nums{
  position:absolute;left:0;top:0;bottom:0;width:44px;
  background:var(--bg2);border-right:1px solid var(--border);
  font-family:var(--mono);font-size:13px;line-height:1.6;
  color:var(--dim);text-align:right;padding:12px 8px 12px 0;
  overflow:hidden;user-select:none;pointer-events:none;
  white-space:pre;
}
textarea.code-editor{
  position:absolute;left:44px;right:0;top:0;bottom:0;
  font-family:var(--mono);font-size:13px;line-height:1.6;
  background:var(--bg);color:var(--hi);border:none;outline:none;
  padding:12px;resize:none;tab-size:2;
  white-space:pre;overflow:auto;
}

.resize-handle{
  position:absolute;right:-4px;top:0;bottom:0;width:8px;
  cursor:col-resize;z-index:5;
}
.resize-handle:hover,.resize-handle.dragging{background:var(--accent);opacity:.5;}

/* ── Right: Chat ── */
.chat-pane{
  flex:1;display:flex;flex-direction:column;overflow:hidden;
  background:var(--bg);
}

.chat-header{
  display:flex;align-items:center;gap:10px;padding:10px 16px;
  border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;
}
.chat-title{font-size:13px;font-weight:600;color:var(--hi);}
.context-chips{display:flex;gap:6px;flex-wrap:wrap;flex:1;}
.chip{
  font-size:11px;padding:2px 8px;border-radius:12px;
  background:var(--bg3);border:1px solid var(--border);color:var(--dim);
  cursor:pointer;transition:all .12s;white-space:nowrap;
}
.chip:hover{border-color:var(--accent2);color:var(--accent2);}
.chip.active{background:rgba(59,130,246,.15);border-color:var(--accent);color:var(--accent2);}

.messages{
  flex:1;overflow-y:auto;padding:16px;
  display:flex;flex-direction:column;gap:12px;
  scroll-behavior:smooth;
}
.messages::-webkit-scrollbar{width:4px;}
.messages::-webkit-scrollbar-track{background:transparent;}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* Messages */
.msg{display:flex;gap:10px;align-items:flex-start;max-width:100%;}
.msg.user{flex-direction:row-reverse;}
.avatar{
  width:30px;height:30px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:14px;
  font-weight:700;
}
.msg.user .avatar{background:var(--accent);color:#fff;}
.msg.ai .avatar{background:var(--bg3);border:1px solid var(--border);}

.bubble{
  max-width:calc(100% - 44px);padding:10px 14px;border-radius:10px;
  font-size:13.5px;line-height:1.65;
}
.msg.user .bubble{
  background:var(--accent);color:#fff;border-radius:10px 3px 10px 10px;
}
.msg.ai .bubble{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:3px 10px 10px 10px;color:var(--text);
}

/* Code blocks inside chat */
.bubble pre{
  margin:8px 0;border-radius:8px;overflow:hidden;
  border:1px solid var(--border);position:relative;
}
.code-block-hdr{
  display:flex;align-items:center;padding:6px 10px;
  background:#1a1b26;border-bottom:1px solid rgba(255,255,255,.06);
  font-family:var(--mono);font-size:11px;color:var(--dim);
}
.code-lang{flex:1;text-transform:uppercase;letter-spacing:.08em;}
.code-actions{display:flex;gap:4px;}
.code-btn{
  font-family:var(--font);font-size:11px;font-weight:500;
  padding:2px 8px;border-radius:4px;border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.06);color:var(--dim);cursor:pointer;
  transition:all .12s;
}
.code-btn:hover{background:rgba(59,130,246,.2);color:var(--accent2);border-color:var(--accent);}
.code-btn.copied{color:var(--green);border-color:var(--green);}
.bubble pre code{
  display:block;padding:12px;font-family:var(--mono);font-size:12px;
  line-height:1.7;overflow-x:auto;
}
.bubble p{margin:6px 0;}
.bubble p:first-child{margin-top:0;}
.bubble p:last-child{margin-bottom:0;}
.bubble ul,.bubble ol{margin:6px 0;padding-left:20px;}
.bubble li{margin:3px 0;}
.bubble h1,.bubble h2,.bubble h3{
  font-size:14px;font-weight:700;margin:10px 0 5px;color:var(--hi);
}
.bubble strong{color:var(--hi);}
.bubble code:not(pre code){
  font-family:var(--mono);font-size:12px;
  background:var(--bg4);padding:1px 5px;border-radius:4px;color:var(--accent2);
}
.bubble a{color:var(--accent2);text-decoration:none;}
.bubble a:hover{text-decoration:underline;}

.typing{display:flex;align-items:center;gap:5px;padding:12px 16px;}
.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--dim);animation:bounce .9s infinite;}
.typing-dot:nth-child(2){animation-delay:.15s;}
.typing-dot:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}

.empty-state{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:16px;color:var(--dim);padding:40px;
}
.empty-icon{font-size:40px;opacity:.5;}
.empty-title{font-size:16px;font-weight:600;color:var(--hi);}
.empty-hint{font-size:13px;text-align:center;line-height:1.6;max-width:320px;}
.suggestion-grid{display:flex;flex-direction:column;gap:8px;margin-top:8px;width:100%;max-width:360px;}
.suggestion{
  font-size:13px;padding:10px 14px;border-radius:8px;
  background:var(--bg2);border:1px solid var(--border);
  cursor:pointer;color:var(--text);transition:all .12s;text-align:left;
  display:flex;align-items:center;gap:8px;
}
.suggestion:hover{border-color:var(--accent);color:var(--hi);}
.suggestion-icon{font-size:16px;}

/* Input area */
.input-area{
  padding:12px 16px;border-top:1px solid var(--border);
  background:var(--bg2);flex-shrink:0;
}
.input-wrap{
  display:flex;align-items:flex-end;gap:8px;
  background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  padding:8px 8px 8px 12px;transition:border-color .15s;
}
.input-wrap:focus-within{border-color:var(--accent);}
.chat-input{
  flex:1;font-family:var(--font);font-size:13.5px;
  background:transparent;border:none;outline:none;color:var(--hi);
  resize:none;max-height:160px;line-height:1.55;
}
.chat-input::placeholder{color:var(--dim);}
.send-btn{
  width:34px;height:34px;border-radius:8px;border:none;
  background:var(--accent);color:#fff;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;transition:opacity .12s;
}
.send-btn:hover{opacity:.85;}
.send-btn:disabled{opacity:.35;cursor:default;}
.input-hint{font-size:11px;color:var(--dim);margin-top:6px;}

/* File browser modal */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  width:min(560px,calc(100vw - 32px));max-height:70vh;
  display:flex;flex-direction:column;overflow:hidden;
}
.modal-hdr{
  display:flex;align-items:center;padding:14px 18px;
  border-bottom:1px solid var(--border);gap:10px;
}
.modal-title{font-size:15px;font-weight:700;color:var(--hi);flex:1;}
.modal-close{background:none;border:none;color:var(--dim);cursor:pointer;font-size:18px;padding:2px 6px;}
.modal-close:hover{color:var(--hi);}
.modal-path{
  padding:8px 14px;border-bottom:1px solid var(--border);
  font-family:var(--mono);font-size:12px;color:var(--dim);
}
.file-list{flex:1;overflow-y:auto;padding:8px;}
.file-item{
  display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;
  cursor:pointer;transition:background .1s;
}
.file-item:hover{background:var(--bg3);}
.file-item-icon{font-size:16px;flex-shrink:0;}
.file-item-name{font-size:13px;color:var(--hi);flex:1;}
.file-item-size{font-size:11px;color:var(--dim);}
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <a class="back" href="/">← Dashboard</a>
    <div class="page-title">CODE ASSISTANT</div>
    <span class="badge">AI</span>

    <div class="hdr-center">
      <div class="model-wrap">
        <span class="model-lbl">Model</span>
        <select class="model-select" id="model-select">
          <option value="">Loading…</option>
        </select>
      </div>
    </div>

    <div class="hdr-right">
      <button class="btn-sm" onclick="newChat()">⊕ New Chat</button>
      <button class="btn-sm danger" onclick="clearChat()">Clear</button>
    </div>
  </header>

  <div class="workspace">

    <!-- Left: File Editor -->
    <div class="editor-pane" id="editor-pane">
      <div class="file-bar">
        <input class="file-path" id="file-path" type="text" placeholder="~/path/to/file.py" spellcheck="false">
        <button class="btn-sm" onclick="browseFile()" title="Browse files">📁</button>
        <button class="btn-sm" onclick="loadFile()" title="Load file into editor">Load</button>
        <button class="btn-sm accent" onclick="saveFile()" title="Save file">Save</button>
      </div>
      <div class="editor-toolbar">
        <button class="btn-sm" onclick="sendFileToChat()">➤ Send to AI</button>
        <button class="btn-sm" onclick="askAboutSelection()">Ask about selection</button>
        <button class="btn-sm" onclick="formatCode()">Format</button>
        <span class="file-meta" id="file-meta">No file loaded</span>
      </div>
      <div class="editor-area">
        <div class="line-nums" id="line-nums">1</div>
        <textarea class="code-editor" id="code-editor"
          placeholder="// Load a file or paste code here&#10;// Press ⌘S to save · Tab inserts spaces"
          spellcheck="false"></textarea>
      </div>
      <div class="resize-handle" id="resize-handle"></div>
    </div>

    <!-- Right: Chat -->
    <div class="chat-pane">
      <div class="chat-header">
        <span class="chat-title">Chat</span>
        <div class="context-chips" id="ctx-chips">
          <span class="chip" id="chip-file" onclick="toggleFileContext()">No file in context</span>
          <span class="chip" id="chip-kb">Knowledge base</span>
        </div>
      </div>

      <div class="messages" id="messages">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">🤖</div>
          <div class="empty-title">Code Assistant</div>
          <div class="empty-hint">Your local AI pair programmer. Ask it to write, explain, debug, or improve code — everything runs offline.</div>
          <div class="suggestion-grid">
            <button class="suggestion" onclick="suggest('Write a Python script that reads a CSV and summarizes column statistics')">
              <span class="suggestion-icon">📊</span>Write a CSV parser in Python
            </button>
            <button class="suggestion" onclick="suggest('Explain how async/await works in JavaScript with an example')">
              <span class="suggestion-icon">📖</span>Explain async/await in JS
            </button>
            <button class="suggestion" onclick="suggest('Write a bash script to monitor disk usage and alert when over 80%')">
              <span class="suggestion-icon">🖥</span>Bash disk usage monitor
            </button>
            <button class="suggestion" onclick="suggest('Review the code in my editor and suggest improvements')">
              <span class="suggestion-icon">🔍</span>Review code in editor
            </button>
          </div>
        </div>
      </div>

      <div class="input-area">
        <div class="input-wrap">
          <textarea class="chat-input" id="chat-input"
            placeholder="Ask anything about code…"
            rows="1"></textarea>
          <button class="send-btn" id="send-btn" onclick="sendMessage()">↑</button>
        </div>
        <div class="input-hint">⌘↵ send · ⌘K new chat · ⌘L load file · Tab = spaces in editor</div>
      </div>
    </div>

  </div>
</div>

<!-- File browser modal -->
<div class="modal-overlay" id="file-modal">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-title">📁 Browse Files</span>
      <button class="modal-close" onclick="closeFileBrowser()">✕</button>
    </div>
    <div class="modal-path" id="modal-path">~</div>
    <div class="file-list" id="file-list"></div>
  </div>
</div>

<script src="/static/marked.min.js"></script>
<script src="/static/highlight.min.js"></script>
<script>
// ─── Marked + highlight.js setup ───────────────────
if (typeof marked !== 'undefined') {
  const renderer = new marked.Renderer();

  renderer.code = function({ text, lang }) {
    const validLang = lang && hljs.getLanguage(lang) ? lang : null;
    const highlighted = validLang
      ? hljs.highlight(text, { language: validLang }).value
      : hljs.highlightAuto(text).value;
    const displayLang = lang || 'text';
    const escaped = text.replace(/"/g, '&quot;');
    return `<pre><div class="code-block-hdr">
      <span class="code-lang">${displayLang}</span>
      <span class="code-actions">
        <button class="code-btn" onclick="insertCode(this)" data-code="${escaped}">↙ Insert</button>
        <button class="code-btn" onclick="copyCode(this)" data-code="${escaped}">Copy</button>
      </span>
    </div><code class="hljs language-${displayLang}">${highlighted}</code></pre>`;
  };

  renderer.link = function({ href, title, tokens }) {
    const text = this.parser.parseInline(tokens);
    const t = title ? ` title="${title}"` : '';
    return `<a href="${href}" target="_blank" rel="noopener"${t}>${text}</a>`;
  };

  marked.setOptions({ breaks: true, gfm: true, renderer });
}

// ─── State ─────────────────────────────────────────
let messages = [];
let currentFile = null;
let includeFileInContext = false;
let isStreaming = false;
let streamController = null;

// ─── Models ────────────────────────────────────────
async function loadModels() {
  try {
    const r = await fetch('http://localhost:11434/api/tags');
    const d = await r.json();
    const sel = document.getElementById('model-select');
    sel.innerHTML = '';
    const models = d.models || [];
    // Prefer coding models
    const coding = ['codellama','deepseek-coder','qwen2.5-coder','starcoder','codegemma','phi'];
    models.sort((a,b) => {
      const aCode = coding.some(c => a.name.toLowerCase().includes(c));
      const bCode = coding.some(c => b.name.toLowerCase().includes(c));
      return bCode - aCode;
    });
    if (models.length === 0) {
      sel.innerHTML = '<option value="">No models — install via Library</option>';
      return;
    }
    models.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.name;
      opt.textContent = m.name.replace(':latest','');
      sel.appendChild(opt);
    });
    // Persist last selection
    const saved = localStorage.getItem('codeassist-model');
    if (saved && models.find(m => m.name === saved)) sel.value = saved;
    sel.onchange = () => localStorage.setItem('codeassist-model', sel.value);
  } catch(e) {
    document.getElementById('model-select').innerHTML = '<option value="">Ollama not running</option>';
  }
}

function getModel() {
  return document.getElementById('model-select').value;
}

// ─── Chat ──────────────────────────────────────────
function suggest(text) {
  document.getElementById('chat-input').value = text;
  autoResize(document.getElementById('chat-input'));
  sendMessage();
}

function buildSystemPrompt() {
  let sys = `You are SVRN Code, an offline AI coding assistant running locally via Ollama on a MacBook Pro.

You specialize in helping users write, debug, explain, and improve code.

Guidelines:
- Always wrap code in markdown fenced blocks with the correct language tag (e.g. \`\`\`python)
- For modifications, show the complete updated code, not just the diff
- Be concise but thorough — explain the "why" not just the "what"
- Suggest best practices and point out potential issues proactively
- Use the user's language/framework preferences when evident
- When reviewing code, organize feedback as: Issues → Suggestions → Quick Wins`;

  if (includeFileInContext && currentFile) {
    const code = document.getElementById('code-editor').value;
    sys += `\n\nThe user currently has this file open in their editor:\nFile: ${currentFile}\n\`\`\`\n${code.slice(0, 8000)}\n\`\`\`\n(Refer to this as "your current file" or "the code in your editor")`;
  }
  return sys;
}

async function sendMessage() {
  if (isStreaming) { stopStream(); return; }
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;

  const model = getModel();
  if (!model) { alert('Select a model first.'); return; }

  input.value = '';
  autoResize(input);
  hideEmpty();

  // Add user message
  addMessage('user', text);
  messages.push({ role: 'user', content: text });

  // Typing indicator
  const typingEl = addTyping();
  setSendState(true);

  try {
    streamController = new AbortController();
    const body = {
      model,
      messages: [
        { role: 'system', content: buildSystemPrompt() },
        ...messages.slice(-20)
      ],
      stream: true,
    };

    const resp = await fetch('http://localhost:11434/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      signal: streamController.signal,
    });

    if (!resp.ok) throw new Error(`Ollama error ${resp.status}`);

    typingEl.remove();
    const aiEl = addMessage('ai', '');
    const bubble = aiEl.querySelector('.bubble');
    let accumulated = '';

    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = dec.decode(value);
      for (const line of chunk.split('\n')) {
        if (!line.trim()) continue;
        try {
          const j = JSON.parse(line);
          if (j.message?.content) {
            accumulated += j.message.content;
            bubble.innerHTML = renderMarkdown(accumulated);
            scrollBottom();
          }
        } catch {}
      }
    }

    messages.push({ role: 'assistant', content: accumulated });

  } catch(e) {
    typingEl?.remove();
    if (e.name !== 'AbortError') {
      addMessage('ai', `⚠️ **Error:** ${e.message}\n\nMake sure Ollama is running: \`ollama serve\``);
    }
  } finally {
    setSendState(false);
    streamController = null;
  }
}

function stopStream() {
  streamController?.abort();
  setSendState(false);
}

function setSendState(streaming) {
  isStreaming = streaming;
  const btn = document.getElementById('send-btn');
  btn.textContent = streaming ? '■' : '↑';
  btn.title = streaming ? 'Stop generation' : 'Send';
}

function renderMarkdown(text) {
  if (typeof marked !== 'undefined') {
    return marked.parse(text);
  }
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function addMessage(role, content) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="avatar">${role === 'user' ? 'U' : '🤖'}</div>
    <div class="bubble">${role === 'ai' ? renderMarkdown(content) : escHtml(content)}</div>
  `;
  msgs.appendChild(div);
  scrollBottom();
  return div;
}

function addTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `
    <div class="avatar">🤖</div>
    <div class="bubble typing">
      <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
    </div>
  `;
  msgs.appendChild(div);
  scrollBottom();
  return div;
}

function scrollBottom() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

function hideEmpty() {
  const e = document.getElementById('empty-state');
  if (e) e.style.display = 'none';
}

function newChat() {
  if (messages.length > 0 && !confirm('Start a new chat? Current conversation will be lost.')) return;
  messages = [];
  document.getElementById('messages').innerHTML = `
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">🤖</div>
      <div class="empty-title">Code Assistant</div>
      <div class="empty-hint">Your local AI pair programmer. Ask it to write, explain, debug, or improve code — everything runs offline.</div>
    </div>`;
}

function clearChat() { newChat(); }

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ─── Code block actions ─────────────────────────────
function copyCode(btn) {
  const code = btn.dataset.code;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1800);
  });
}

function insertCode(btn) {
  const code = btn.dataset.code;
  const editor = document.getElementById('code-editor');
  const start = editor.selectionStart;
  const before = editor.value.slice(0, start);
  const after = editor.value.slice(editor.selectionEnd);
  editor.value = before + code + after;
  editor.selectionStart = editor.selectionEnd = start + code.length;
  editor.focus();
  updateLineNums();
  updateFileMeta();
  btn.textContent = 'Inserted!';
  setTimeout(() => { btn.textContent = '↙ Insert'; }, 1500);
}

// ─── Editor ────────────────────────────────────────
const editor = document.getElementById('code-editor');

editor.addEventListener('keydown', e => {
  // Tab → spaces
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = editor.selectionStart;
    const spaces = '  ';
    editor.value = editor.value.slice(0,s) + spaces + editor.value.slice(editor.selectionEnd);
    editor.selectionStart = editor.selectionEnd = s + spaces.length;
    updateLineNums();
    return;
  }
  // ⌘S → save
  if ((e.metaKey||e.ctrlKey) && e.key === 's') {
    e.preventDefault();
    saveFile();
  }
});

editor.addEventListener('input', () => { updateLineNums(); updateFileMeta(); });
editor.addEventListener('scroll', syncLineScroll);

function updateLineNums() {
  const lines = editor.value.split('\n').length;
  const nums = Array.from({length: lines}, (_,i) => i+1).join('\n');
  document.getElementById('line-nums').textContent = nums;
}

function syncLineScroll() {
  document.getElementById('line-nums').scrollTop = editor.scrollTop;
}

function updateFileMeta() {
  const lines = editor.value.split('\n').length;
  const chars = editor.value.length;
  const fname = currentFile ? currentFile.split('/').pop() : null;
  document.getElementById('file-meta').textContent =
    (fname ? fname + ' · ' : '') + `${lines} lines · ${chars} chars`;
}

// ─── File ops ──────────────────────────────────────
async function loadFile() {
  let raw = document.getElementById('file-path').value.trim();
  if (!raw) { alert('Enter a file path first.'); return; }
  if (raw.startsWith('~')) raw = raw.replace('~', ''); // server uses expanduser
  try {
    const r = await fetch('/api/files/read?path=' + encodeURIComponent(raw));
    const d = await r.json();
    if (d.error) { alert('Error: ' + d.error); return; }
    editor.value = d.content;
    currentFile = d.path;
    document.getElementById('file-path').value = d.path;
    updateLineNums();
    updateFileMeta();
    updateFileChip();
  } catch(e) { alert('Load failed: ' + e.message); }
}

async function saveFile() {
  const raw = document.getElementById('file-path').value.trim();
  if (!raw) { alert('Enter a file path first.'); return; }
  const content = editor.value;
  try {
    const r = await fetch('/api/files/write', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ path: raw, content }),
    });
    const d = await r.json();
    if (d.error) { alert('Error: ' + d.error); return; }
    currentFile = d.path;
    document.getElementById('file-path').value = d.path;
    // Brief success flash
    const meta = document.getElementById('file-meta');
    const prev = meta.textContent;
    meta.textContent = '✓ Saved';
    meta.style.color = 'var(--green)';
    setTimeout(() => { meta.textContent = prev; meta.style.color = ''; }, 1500);
    updateFileChip();
  } catch(e) { alert('Save failed: ' + e.message); }
}

function sendFileToChat() {
  const code = editor.value.trim();
  if (!code) { alert('Editor is empty.'); return; }
  const path = currentFile || 'untitled';
  const ext = path.split('.').pop();
  const lang = ext || 'text';
  const input = document.getElementById('chat-input');
  input.value = `Please review the following code and suggest improvements:\n\`\`\`${lang}\n${code.slice(0,6000)}\n\`\`\``;
  autoResize(input);
  input.focus();
}

function askAboutSelection() {
  const sel = editor.value.slice(editor.selectionStart, editor.selectionEnd).trim();
  if (!sel) { alert('Select some code in the editor first.'); return; }
  const ext = (currentFile || '').split('.').pop();
  const input = document.getElementById('chat-input');
  input.value = `Explain this code:\n\`\`\`${ext || 'text'}\n${sel}\n\`\`\``;
  autoResize(input);
  input.focus();
}

function formatCode() {
  const input = document.getElementById('chat-input');
  const code = editor.value.trim();
  if (!code) { alert('Editor is empty.'); return; }
  const ext = (currentFile || '').split('.').pop();
  input.value = `Format and clean up this code, fixing indentation and style:\n\`\`\`${ext || 'text'}\n${code.slice(0,4000)}\n\`\`\``;
  autoResize(input);
  sendMessage();
}

// ─── File context chip ─────────────────────────────
function toggleFileContext() {
  includeFileInContext = !includeFileInContext;
  updateFileChip();
}

function updateFileChip() {
  const chip = document.getElementById('chip-file');
  if (currentFile) {
    const fname = currentFile.split('/').pop();
    chip.textContent = `📄 ${fname}`;
    chip.classList.toggle('active', includeFileInContext);
    chip.title = includeFileInContext ? 'File included in context (click to remove)' : 'Click to include file in AI context';
  } else {
    chip.textContent = 'No file in context';
    chip.classList.remove('active');
    includeFileInContext = false;
  }
}

// ─── File browser modal ────────────────────────────
let currentBrowsePath = null;

async function browseFile() {
  const startPath = currentFile
    ? currentFile.substring(0, currentFile.lastIndexOf('/'))
    : null;
  await openFileBrowser(startPath);
}

async function openFileBrowser(path) {
  document.getElementById('file-modal').classList.add('open');
  await loadDirectory(path || '~');
}

function closeFileBrowser() {
  document.getElementById('file-modal').classList.remove('open');
}

async function loadDirectory(path) {
  currentBrowsePath = path;
  document.getElementById('modal-path').textContent = path;
  document.getElementById('file-list').innerHTML = '<div style="padding:20px;color:var(--dim);text-align:center">Loading…</div>';
  try {
    const r = await fetch('/api/files/list?path=' + encodeURIComponent(path));
    const d = await r.json();
    if (d.error) {
      document.getElementById('file-list').innerHTML = `<div style="padding:20px;color:var(--red)">${d.error}</div>`;
      return;
    }
    const fl = document.getElementById('file-list');
    fl.innerHTML = '';

    // Up button
    const parts = d.path.split('/');
    if (parts.length > 2) {
      const parentPath = parts.slice(0,-1).join('/');
      const up = document.createElement('div');
      up.className = 'file-item';
      up.innerHTML = `<span class="file-item-icon">⬆️</span><span class="file-item-name">.. (parent)</span>`;
      up.onclick = () => loadDirectory(parentPath);
      fl.appendChild(up);
    }

    d.items.forEach(item => {
      const el = document.createElement('div');
      el.className = 'file-item';
      const icon = item.type === 'dir' ? '📁' : getFileIcon(item.name);
      const size = item.size ? ` · ${formatSize(item.size)}` : '';
      el.innerHTML = `<span class="file-item-icon">${icon}</span>
        <span class="file-item-name">${item.name}</span>
        <span class="file-item-size">${size}</span>`;
      if (item.type === 'dir') {
        el.onclick = () => loadDirectory(item.path);
      } else {
        el.onclick = () => selectFile(item.path);
      }
      fl.appendChild(el);
    });
  } catch(e) {
    document.getElementById('file-list').innerHTML = `<div style="padding:20px;color:var(--red)">Error: ${e.message}</div>`;
  }
}

function selectFile(path) {
  document.getElementById('file-path').value = path;
  closeFileBrowser();
  loadFile();
}

function getFileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  const icons = {
    py:'🐍', js:'🟨', ts:'🔷', jsx:'⚛️', tsx:'⚛️',
    html:'🌐', css:'🎨', json:'📋', md:'📝', sh:'⚙️',
    txt:'📄', yaml:'⚙️', yml:'⚙️', toml:'⚙️', env:'🔒',
    go:'🐹', rs:'🦀', rb:'💎', php:'🐘', c:'©️', cpp:'➕',
    java:'☕', swift:'🦅', kt:'🎯', dart:'🎯',
  };
  return icons[ext] || '📄';
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1024/1024).toFixed(1) + ' MB';
}

// ─── Input auto-resize ─────────────────────────────
const chatInput = document.getElementById('chat-input');
chatInput.addEventListener('input', () => autoResize(chatInput));
chatInput.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    e.preventDefault();
    sendMessage();
    return;
  }
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

// ─── Keyboard shortcuts ────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.metaKey||e.ctrlKey) && e.key === 'k') { e.preventDefault(); newChat(); }
  if ((e.metaKey||e.ctrlKey) && e.key === 'l') { e.preventDefault(); document.getElementById('file-path').focus(); }
  if (e.key === 'Escape') closeFileBrowser();
});

// ─── Resize handle ─────────────────────────────────
(function() {
  const handle = document.getElementById('resize-handle');
  const pane = document.getElementById('editor-pane');
  let dragging = false, startX = 0, startW = 0;

  handle.addEventListener('mousedown', e => {
    dragging = true;
    startX = e.clientX;
    startW = pane.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const newW = Math.max(260, Math.min(startW + (e.clientX - startX), window.innerWidth * 0.7));
    pane.style.width = newW + 'px';
  });

  document.addEventListener('mouseup', () => {
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

// ─── Init ──────────────────────────────────────────
loadModels();
updateLineNums();
</script>
</body>
</html>
