<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVRN · Docs</title>
<style>
:root {
  --bg:#f0f0ee; --bg2:#ffffff; --bg3:#e8e8e5; --border:#d4d4d0;
  --text:#3a3a3c; --dim:#8e8e93; --hi:#1c1c1e; --accent:#2f6fd4;
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Helvetica,Arial,sans-serif;
  --mono:'JetBrains Mono','SF Mono','Fira Code',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;}

header{
  display:flex;align-items:center;gap:16px;padding:12px 24px;
  border-bottom:1px solid var(--border);background:var(--bg2);
  position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.back{color:var(--dim);text-decoration:none;font-size:13px;}
.back:hover{color:var(--hi);}
.page-title{font-size:16px;font-weight:700;letter-spacing:.08em;color:var(--hi);}
.hdr-search{
  margin-left:auto;background:var(--bg3);border:1px solid var(--border);
  border-radius:7px;display:flex;align-items:center;gap:6px;padding:6px 12px;
  width:240px;
}
.hdr-search input{
  background:none;border:none;outline:none;font-family:var(--font);
  font-size:13px;color:var(--hi);flex:1;
}

.layout{display:flex;min-height:calc(100vh - 49px);}

/* Sidebar TOC */
.toc{
  width:240px;flex-shrink:0;border-right:1px solid var(--border);
  background:var(--bg2);padding:20px 0;position:sticky;
  top:49px;height:calc(100vh - 49px);overflow-y:auto;
}
.toc-label{font-size:10px;letter-spacing:.14em;color:var(--dim);
  text-transform:uppercase;padding:0 18px 8px;margin-top:12px;margin-bottom:4px;}
.toc-item{
  display:block;padding:7px 18px;font-size:13px;color:var(--dim);
  text-decoration:none;border-left:2px solid transparent;
  transition:color .12s,border-color .12s;cursor:pointer;
  border:none;background:none;font-family:var(--font);width:100%;text-align:left;
}
.toc-item:hover{color:var(--hi);}
.toc-item.active{color:var(--accent);border-left-color:var(--accent);background:rgba(47,111,212,.06);}

/* Docs content */
.doc-content{flex:1;padding:40px 56px;max-width:820px;}
.doc-content h1{
  font-size:26px;font-weight:800;color:var(--hi);margin-bottom:8px;
  letter-spacing:.02em;
}
.doc-subtitle{font-size:14px;color:var(--dim);margin-bottom:36px;border-bottom:1px solid var(--border);padding-bottom:20px;}
.section{margin-bottom:44px;}
.section h2{
  font-size:18px;font-weight:700;color:var(--hi);margin-bottom:14px;
  padding-bottom:8px;border-bottom:1px solid var(--border);
  scroll-margin-top:70px;
}
.section h3{font-size:15px;font-weight:700;color:var(--hi);margin:18px 0 8px;}
.section p{font-size:14px;line-height:1.8;color:var(--text);margin-bottom:10px;}
.section ul,.section ol{padding-left:1.4em;margin:8px 0 12px;}
.section li{font-size:14px;line-height:1.75;color:var(--text);margin-bottom:3px;}
.section code{
  font-family:var(--mono);font-size:12.5px;background:var(--bg3);
  padding:2px 7px;border-radius:4px;color:var(--hi);
}
.section pre{
  background:var(--bg2);border:1px solid var(--border);border-radius:8px;
  padding:16px 20px;overflow-x:auto;margin:12px 0 16px;
  font-family:var(--mono);font-size:13px;line-height:1.6;color:var(--text);
}
.callout{
  border-left:3px solid var(--accent);background:rgba(47,111,212,.06);
  border-radius:0 8px 8px 0;padding:14px 18px;margin:16px 0;font-size:14px;
  line-height:1.7;color:var(--hi);
}
.callout.green{border-left-color:#16a34a;background:rgba(22,163,74,.06);}
.callout.amber{border-left-color:#d97706;background:rgba(217,119,6,.06);}

mark{background:rgba(47,111,212,.18);border-radius:2px;color:var(--hi);}
</style>
</head>
<body>

<header>
  <a class="back" href="/">← Dashboard</a>
  <div class="page-title">DOCS</div>
  <div class="hdr-search">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#8e8e93" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search-input" placeholder="Search docs…" oninput="searchDocs(this.value)">
  </div>
</header>

<div class="layout">
  <nav class="toc" id="toc"></nav>
  <div class="doc-content" id="doc-content">
    <p style="color:var(--dim);font-size:14px">Loading documentation…</p>
  </div>
</div>

  power: {
    title: 'Power Management',
    body: `
<p>SVRN is designed to run on a MacBook. The power wrapper system ensures heavy services only run when you're on AC power, extending battery life when unplugged.</p>
<h3>How It Works</h3>

let currentSearchTerm = '';

function buildTOC() {
  const toc = document.getElementById('toc');
  toc.innerHTML = SECTIONS.map(s =>
    `<button class="toc-item" id="toc-${s.id}" onclick="showSection('${s.id}')">${s.icon} ${s.title}</button>`
  ).join('');
}

function showSection(id, pushState = true) {
  SECTIONS.forEach(s => {
    document.getElementById(`toc-${s.id}`)?.classList.toggle('active', s.id === id);
  });
  const sec = CONTENT[id];
  if (!sec) return;
  let html = `<h1>${sec.title}</h1>`;
  html += '<div class="section">' + sec.body + '</div>';
  if (currentSearchTerm) {
    html = highlightSearch(html, currentSearchTerm);
  }
  document.getElementById('doc-content').innerHTML = html;
  if (pushState) history.pushState({id}, '', `#${id}`);
  window.scrollTo(0, 0);
}

function highlightSearch(html, term) {
  const esc = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return html.replace(new RegExp(`(${esc})`, 'gi'), '<mark>$1</mark>');
}

function searchDocs(q) {
  currentSearchTerm = q.trim().toLowerCase();
  if (!currentSearchTerm) { buildTOC(); showSection(SECTIONS[0].id); return; }
  const results = SECTIONS.filter(s => {
    const c = CONTENT[s.id];
    return s.title.toLowerCase().includes(currentSearchTerm) ||
      (c && c.body.replace(/<[^>]+>/g,'').toLowerCase().includes(currentSearchTerm));
  });
  const toc = document.getElementById('toc');
  toc.innerHTML = results.length
    ? results.map(s => `<button class="toc-item" id="toc-${s.id}" onclick="showSection('${s.id}')">${s.icon} ${s.title}</button>`).join('')
    : `<div style="padding:20px 18px;font-size:13px;color:var(--dim)">No results for "${q}"</div>`;
  if (results.length) showSection(results[0].id);
}

// Init
buildTOC();
const hash = location.hash.slice(1);
showSection(hash && CONTENT[hash] ? hash : SECTIONS[0].id, false);
</script>
</body>
</html>
