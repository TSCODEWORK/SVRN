<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVRN</title>
<script src="/static/marked.min.js"></script>
<style>
:root {
  --bg:#f0f0ee; --bg2:#ffffff; --bg3:#e8e8e5; --border:#d4d4d0;
  --text:#3a3a3c; --dim:#8e8e93; --hi:#1c1c1e; --accent:#2f6fd4;
  --green:#16a34a; --red:#dc2626; --amber:#d97706;
  --font:'JetBrains Mono','Cascadia Code','SF Mono','Fira Code',monospace;
  --ui:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Helvetica,Arial,sans-serif;
  --shadow:0 1px 4px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;}

/* ── Header ── */
header{
  display:flex;align-items:center;gap:20px;padding:16px 28px;
  border-bottom:1px solid var(--border);background:var(--bg2);
  position:sticky;top:0;z-index:100;box-shadow:var(--shadow);
}
.brand{font-size:18px;font-weight:700;letter-spacing:.28em;color:var(--hi);}
.tagline{font-size:12px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}
.stats-bar{display:flex;gap:24px;margin-left:auto;align-items:center;}
.stat{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.stat-label{font-size:11px;color:var(--dim);letter-spacing:.08em;text-transform:uppercase;}
.stat-val{font-size:14px;font-weight:600;color:var(--hi);}
.vault-dot{width:9px;height:9px;border-radius:50%;background:var(--red);flex-shrink:0;}
.vault-dot.on{background:var(--green);}

/* ── App grid ── */
main{padding:36px 32px;max-width:1400px;margin:0 auto;}
.section-label{
  font-size:12px;letter-spacing:.16em;color:var(--dim);text-transform:uppercase;
  margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid var(--border);
}
.app-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:20px;margin-bottom:40px;
}

/* ── App card ── */
.card{
  background:var(--bg2);border:1px solid var(--border);border-radius:14px;
  padding:28px 24px;cursor:pointer;box-shadow:var(--shadow);
  transition:border-color .15s,box-shadow .15s,transform .12s;
  display:flex;flex-direction:column;gap:14px;position:relative;overflow:hidden;
}
.card:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(47,111,212,.12);transform:translateY(-2px);}
.card-icon{font-size:40px;line-height:1;}
.card-title{font-size:19px;font-weight:700;letter-spacing:.04em;color:var(--hi);}
.card-desc{font-size:13px;color:var(--dim);line-height:1.65;}
.card-footer{display:flex;align-items:center;gap:8px;margin-top:auto;}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--dim);flex-shrink:0;}
.status-dot.up{background:var(--green);box-shadow:0 0 0 3px rgba(22,163,74,.15);}
.status-dot.down{background:var(--red);}
.status-text{font-size:13px;color:var(--dim);}
.card-badge{
  position:absolute;top:14px;right:14px;font-size:10px;letter-spacing:.1em;
  color:var(--dim);background:var(--bg3);border:1px solid var(--border);
  border-radius:4px;padding:3px 9px;text-transform:uppercase;
}

/* ── Vault bar ── */
.vault-bar{
  background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:16px 22px;margin-bottom:32px;
  display:flex;gap:28px;align-items:flex-start;flex-wrap:wrap;
  box-shadow:var(--shadow);
}
.v-label{font-size:11px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;}
.v-val{font-size:14px;color:var(--hi);margin-top:4px;font-weight:600;}
.v-sep{width:1px;background:var(--border);align-self:stretch;}
.prog-bar{height:5px;background:var(--bg3);border-radius:3px;width:140px;margin-top:7px;}
.prog-fill{height:100%;border-radius:3px;background:var(--accent);}
.zim-pills{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;}
.zim-pill{
  font-size:12px;padding:4px 12px;border-radius:5px;
  background:var(--bg3);border:1px solid var(--border);color:var(--text);
  cursor:pointer;text-decoration:none;display:inline-block;
  transition:border-color .12s,color .12s;
}
.zim-pill:hover{border-color:var(--accent);color:var(--accent);}

/* ── Floating chat button ── */
.chat-fab{
  position:fixed;bottom:28px;right:28px;z-index:150;
  width:56px;height:56px;border-radius:50%;
  background:var(--accent);border:none;cursor:pointer;
  box-shadow:0 4px 20px rgba(47,111,212,.4);
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s,box-shadow .15s,background .15s;
  color:#fff;
}
.chat-fab:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(47,111,212,.55);}
.chat-fab:active{transform:scale(.96);}
.chat-fab svg{width:26px;height:26px;}
.fab-badge{
  position:absolute;top:-3px;right:-3px;width:18px;height:18px;
  background:var(--red);border-radius:50%;border:2px solid var(--bg2);
  font-size:10px;font-weight:700;color:#fff;display:none;
  align-items:center;justify-content:center;font-family:var(--ui);
}
.fab-badge.show{display:flex;}
.fab-tooltip{
  position:absolute;bottom:calc(100% + 10px);right:0;
  background:var(--hi);color:#fff;font-family:var(--ui);font-size:12px;
  padding:6px 12px;border-radius:7px;white-space:nowrap;pointer-events:none;
  opacity:0;transform:translateY(4px);transition:opacity .15s,transform .15s;
}
.chat-fab:hover .fab-tooltip{opacity:1;transform:translateY(0);}

/* ── Chat panel (slide-in drawer, not modal) ── */
.chat-panel{
  position:fixed;bottom:96px;right:28px;z-index:140;
  width:min(440px,calc(100vw - 40px));
  height:min(600px,calc(100vh - 140px));
  background:var(--bg2);border:1px solid var(--border);border-radius:16px;
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,.18);
  transform:scale(.92) translateY(16px);transform-origin:bottom right;
  opacity:0;pointer-events:none;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),opacity .18s;
}
.chat-panel.open{transform:scale(1) translateY(0);opacity:1;pointer-events:all;}
.chat-panel-header{
  display:flex;align-items:center;gap:10px;padding:14px 18px;
  border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg2);
}
.chat-panel-title{font-size:14px;font-weight:700;letter-spacing:.08em;color:var(--hi);flex:1;font-family:var(--ui);}
.model-select{
  background:var(--bg3);border:1px solid var(--border);border-radius:6px;
  color:var(--hi);font-family:var(--ui);font-size:12px;padding:5px 10px;
  outline:none;cursor:pointer;max-width:160px;
}
.panel-close{
  background:none;border:none;cursor:pointer;color:var(--dim);
  font-size:20px;padding:2px 6px;line-height:1;display:flex;align-items:center;
}
.panel-close:hover{color:var(--hi);}
.chat-messages{
  flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;
  background:var(--bg);scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
.msg{display:flex;flex-direction:column;gap:4px;max-width:88%;}
.msg.user{align-self:flex-end;align-items:flex-end;}
.msg.ai{align-self:flex-start;align-items:flex-start;}
.msg-bubble{
  padding:10px 14px;border-radius:12px;font-size:13.5px;
  line-height:1.65;font-family:var(--ui);
}
.msg.user .msg-bubble{background:var(--accent);color:#fff;border-radius:12px 12px 3px 12px;}
.msg.ai .msg-bubble{
  background:var(--bg2);border:1px solid var(--border);color:var(--text);
  border-radius:12px 12px 12px 3px;
}
/* Markdown in AI bubbles */
.msg.ai .msg-bubble p{margin:.4em 0;line-height:1.7;}
.msg.ai .msg-bubble p:first-child{margin-top:0;}
.msg.ai .msg-bubble p:last-child{margin-bottom:0;}
.msg.ai .msg-bubble h1,.msg.ai .msg-bubble h2,.msg.ai .msg-bubble h3{
  font-size:14px;font-weight:700;margin:.6em 0 .3em;color:var(--hi);}
.msg.ai .msg-bubble code{
  font-family:var(--font);font-size:12px;background:var(--bg3);
  padding:2px 5px;border-radius:4px;color:var(--hi);}
.msg.ai .msg-bubble pre{
  background:var(--bg3);border:1px solid var(--border);border-radius:7px;
  padding:10px 14px;margin:.6em 0;overflow-x:auto;font-size:12px;}
.msg.ai .msg-bubble pre code{background:none;padding:0;}
.msg.ai .msg-bubble ul,.msg.ai .msg-bubble ol{padding-left:1.3em;margin:.4em 0;}
.msg.ai .msg-bubble li{line-height:1.7;}
.msg.ai .msg-bubble strong{font-weight:700;color:var(--hi);}
.msg.ai .msg-bubble a{
  color:var(--accent);text-decoration:underline;text-underline-offset:3px;
  text-decoration-thickness:1px;cursor:pointer;transition:opacity .12s;
}
.msg.ai .msg-bubble a:hover{opacity:.75;}
.msg-label{font-size:10px;color:var(--dim);letter-spacing:.06em;font-family:var(--ui);}
.typing-dot{display:inline-block;width:6px;height:6px;border-radius:50%;
  background:var(--dim);margin:0 2px;animation:blink 1.2s infinite;}
.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.2;}40%{opacity:1;}}

.chat-input-row{
  display:flex;gap:8px;padding:12px 14px;
  border-top:1px solid var(--border);flex-shrink:0;background:var(--bg2);
}
#chat-input{
  flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  color:var(--hi);font-family:var(--ui);font-size:14px;padding:10px 14px;
  resize:none;outline:none;max-height:120px;overflow-y:auto;line-height:1.5;
}
#chat-input:focus{border-color:var(--accent);}
.send-btn{
  background:var(--accent);border:none;border-radius:10px;color:#fff;
  font-family:var(--ui);font-size:13px;font-weight:600;
  padding:10px 16px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.send-btn:hover{opacity:.88;}
.send-btn:disabled{opacity:.35;cursor:default;}
.chat-suggestions{
  display:flex;flex-wrap:wrap;gap:6px;padding:10px 14px 2px;flex-shrink:0;
}
.suggestion-chip{
  font-family:var(--ui);font-size:11.5px;padding:5px 11px;border-radius:20px;
  background:var(--bg3);border:1px solid var(--border);color:var(--dim);
  cursor:pointer;transition:border-color .12s,color .12s;
  white-space:nowrap;
}
.suggestion-chip:hover{border-color:var(--accent);color:var(--accent);}
</style>
</head>
<body>

<header>
  <div>
    <div class="brand">SVRN</div>
    <div class="tagline">Offline Command Center</div>
  </div>
  <div class="stats-bar">
    <div class="stat">
      <span class="stat-label">CPU</span>
      <span class="stat-val" id="h-cpu">—</span>
    </div>
    <div class="stat">
      <span class="stat-label">RAM</span>
      <span class="stat-val" id="h-ram">—</span>
    </div>
    <div class="stat">
      <span class="stat-label">Power</span>
      <span class="stat-val" id="h-pwr">—</span>
    </div>
    <div style="display:flex;align-items:center;gap:9px;border-left:1px solid var(--border);padding-left:22px;">
      <div class="vault-dot" id="vault-dot"></div>
      <div>
        <div class="stat-label">your storage drive</div>
        <div class="stat-val" id="vault-space">—</div>
      </div>
    </div>
  </div>
</header>

<main>
  <div class="vault-bar" id="vault-bar" style="display:none">
    <div>
      <div class="v-label">Storage</div>
      <div class="v-val" id="v-storage">—</div>
      <div class="prog-bar"><div class="prog-fill" id="v-prog" style="width:0%"></div></div>
    </div>
    <div class="v-sep"></div>
    <div>
      <div class="v-label">ZIM Libraries</div>
      <div class="zim-pills" id="v-zims"><span style="font-size:13px;color:var(--dim)">—</span></div>
    </div>
    <div class="v-sep"></div>
    <div>
      <div class="v-label">Maps</div>
      <div class="zim-pills" id="v-maps"><span style="font-size:13px;color:var(--dim)">—</span></div>
    </div>
  </div>

  <div class="section-label">Applications</div>
  <div class="app-grid" id="app-grid"></div>
</main>

<!-- Floating chat button -->
<button class="chat-fab" id="chat-fab" onclick="toggleChat()" aria-label="Open AI Chat">
  <div class="fab-badge" id="fab-badge"></div>
  <div class="fab-tooltip">Ask your AI anything</div>
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
</button>

<!-- Chat panel (slide-up drawer) -->
<div class="chat-panel" id="chat-panel">
  <div class="chat-panel-header">
    <div>
      <div class="chat-panel-title">AI ASSISTANT</div>
    </div>
    <select class="model-select" id="model-select"></select>
    <button class="panel-close" onclick="toggleChat()" title="Close">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <div class="chat-suggestions" id="chat-suggestions">
    <button class="suggestion-chip" onclick="sendSuggestion(this)">What's on my vault?</button>
    <button class="suggestion-chip" onclick="sendSuggestion(this)">How do I download a map?</button>
    <button class="suggestion-chip" onclick="sendSuggestion(this)">What AI models are available?</button>
    <button class="suggestion-chip" onclick="sendSuggestion(this)">Summarize what SVRN can do</button>
  </div>

  <div class="chat-messages" id="chat-messages"></div>

  <div class="chat-input-row">
    <textarea id="chat-input" rows="1" placeholder="Ask anything… (⏎ send, ⇧⏎ newline)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendChat()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script>
const APPS = [
  { id:'ollama',    icon:'🤖', title:'AI Chat',        badge:'LOCAL AI', port:11434, action:'chat',
    desc:'Offline language models via Ollama. No cloud, no telemetry.' },
  { id:'openwebui', icon:'💬', title:'Open WebUI',     badge:'WEB UI',   port:8080,  action:'external', url:'http://localhost:8080',
    desc:'Full-featured chat interface with history, documents, and multi-model support.' },
  { id:'wikipedia', icon:'📖', title:'Wikipedia',      badge:'OFFLINE',  port:8888,  action:'external', url:'http://localhost:8888',
    desc:'Full offline Wikipedia — millions of articles, fully searchable.' },
  { id:'medical',   icon:'🏥', title:'Medical Library', badge:'OFFLINE', port:8888,  action:'external', url:'http://localhost:8888',
    desc:'Offline medical references: drugs, conditions, symptoms, procedures.' },
  { id:'maps',      icon:'🗺️', title:'Offline Maps',   badge:'PMTILES',  port:3333,  action:'page',     url:'/maps',
    desc:'Vector maps from your vault. Navigate and explore without internet.' },
  { id:'education', icon:'🎓', title:'Education',      badge:'OFFLINE',  port:8888,  action:'external', url:'http://localhost:8888',
    desc:'Khan Academy, textbooks, and learning resources — fully offline.' },
  { id:'notes',     icon:'📝', title:'Notes',          badge:'LOCAL',    port:null,  action:'page',     url:'/notes',
    desc:'Private markdown notes stored on your Mac. Auto-saves, full-text search, live preview.' },
  { id:'codeassist',icon:'💻', title:'Code Assistant', badge:'AI',       port:null,  action:'page',     url:'/codeassist',
    desc:'Local AI pair programmer — write, debug, explain, and improve code entirely offline with Ollama.' },
  { id:'datatools', icon:'🔧', title:'Data Tools',     badge:'OFFLINE',  port:null,  action:'page',     url:'/datatools',
    desc:'Encode, decode, encrypt, hash, and transform data. 30+ operations — fully offline, no dependencies.' },
  { id:'library',   icon:'⬇️', title:'Library Manager', badge:'DOWNLOADS', port:null,  action:'page',     url:'/library',
    desc:'Download and manage ZIM libraries, offline maps, and AI models — all in one place.' },
  { id:'ose', icon:'🌱', title:'Open Source Ecology', badge:'WIKI', port:null, action:'page', url:'/ose',
    desc:'Browse the full OSE wiki offline — GVCS machines, construction blueprints, and self-sufficiency guides.' },
  { id:'docs',      icon:'📋', title:'Docs',           badge:'GUIDE',    port:null,  action:'page',     url:'/docs',
    desc:'SVRN documentation — setup guides, service reference, and quick-start commands.' },
  { id:'settings',  icon:'⚙️', title:'Settings',       badge:'CONFIG',   port:null,  action:'page',     url:'/settings',
    desc:'Configure vault paths, AI endpoints, map sources, and dashboard behavior.' },
];

let svcStatus = {};

function buildGrid() {
  const grid = document.getElementById('app-grid');
  grid.innerHTML = '';
  APPS.forEach(app => {
    let dotCls, statusTxt;
    if (app.port === null) {
      dotCls = 'up'; statusTxt = 'Available';
    } else {
      const up = svcStatus[app.port];
      dotCls   = up === true ? 'up' : up === false ? 'down' : '';
      statusTxt= up === true ? 'Online' : up === false ? 'Offline' : 'Checking…';
    }
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-icon">${app.icon}</div>
      <div>
        <div class="card-title">${app.title}</div>
        <div class="card-desc">${app.desc}</div>
      </div>
      <div class="card-footer">
        <div class="status-dot ${dotCls}"></div>
        <span class="status-text">${statusTxt}</span>
      </div>
      <div class="card-badge">${app.badge}</div>
    `;
    card.addEventListener('click', () => {
      if (app.action === 'chat')     { openChatFromCard(); return; }
      if (app.action === 'external') { window.open(app.url,'_blank'); return; }
      if (app.action === 'page')     { window.open(app.url,'_blank'); return; }
    });
    grid.appendChild(card);
  });
}

async function pollStatus() {
  try {
    const data = await fetch('/api/services').then(r => r.json());
    data.forEach(s => { svcStatus[s.port] = s.up; });
    buildGrid();
  } catch {}
}

async function pollSystem() {
  try {
    const [sys, vault] = await Promise.all([
      fetch('/api/system').then(r => r.json()),
      fetch('/api/vault').then(r => r.json()),
    ]);
    document.getElementById('h-cpu').textContent = sys.cpu_pct != null ? sys.cpu_pct + '%' : '—';
    document.getElementById('h-ram').textContent = sys.ram_used_gb != null
      ? sys.ram_used_gb + '/' + sys.ram_total_gb + ' GB' : '—';
    document.getElementById('h-pwr').textContent = sys.power_source === 'AC'
      ? '⚡ AC' : sys.battery_pct != null ? '🔋 ' + sys.battery_pct + '%' : '—';
    const dot = document.getElementById('vault-dot');
    if (vault.connected) {
      dot.classList.add('on');
      document.getElementById('vault-space').textContent = vault.free_gb + ' GB free';
      renderVaultBar(vault);
      // Store vault context for AI
      window._vaultCtx = vault;
    } else {
      dot.classList.remove('on');
      document.getElementById('vault-space').textContent = 'Not connected';
      document.getElementById('vault-bar').style.display = 'none';
      window._vaultCtx = null;
    }
  } catch {}
}

function renderVaultBar(vault) {
  document.getElementById('vault-bar').style.display = 'flex';
  document.getElementById('v-storage').textContent = vault.used_gb + ' GB used of ' + vault.total_gb + ' GB';
  document.getElementById('v-prog').style.width = (vault.used_pct || 0) + '%';
  const zims = vault.zims_all || [];
  document.getElementById('v-zims').innerHTML = zims.length
    ? zims.map(z => `<a class="zim-pill" href="http://localhost:8888/zim/${z.name}/" target="_blank">${z.name.replace(/_/g,' ')}</a>`).join('')
    : '<span style="font-size:13px;color:var(--dim)">No ZIM files on vault</span>';
  const maps = vault.maps || [];
  document.getElementById('v-maps').innerHTML = maps.length
    ? maps.map(m => `<a class="zim-pill" href="/maps">${m.name.replace(/_/g,' ')} (${m.size_gb} GB)</a>`).join('')
    : '<span style="font-size:13px;color:var(--dim)">No maps downloaded</span>';
}

/* ══════════════════════════════════
   Chat panel
══════════════════════════════════ */
let chatHistory = [];
let streaming   = false;
let panelOpen   = false;
let modelsLoaded = false;
let unreadCount = 0;

function buildSystemPrompt() {
  const v = window._vaultCtx;
  const services = Object.entries(svcStatus)
    .map(([port, up]) => `port ${port}: ${up ? 'online' : 'offline'}`).join(', ');

  let vaultInfo = 'your storage drive is not connected.';
  if (v) {
    const zims = (v.zims_all || []).map(z => z.name.replace(/_/g, ' ')).join(', ') || 'none';
    const maps = (v.maps || []).map(m => m.name.replace(/_/g, ' ')).join(', ') || 'none';
    vaultInfo = `your storage drive is connected with ${v.free_gb} GB free of ${v.total_gb} GB total.
Loaded ZIM libraries: ${zims}.
Installed offline maps: ${maps}.`;
  }

  return `You are SVRN's built-in AI assistant — a helpful, knowledgeable assistant running entirely offline on the user's MacBook.

Current system status:
- Services: ${services || 'status pending'}
- ${vaultInfo}

async function loadModels() {
  if (modelsLoaded) return;
  const sel = document.getElementById('model-select');
  try {
    const data = await fetch('http://localhost:11434/api/tags').then(r => r.json());
    const models = data.models || [];
    sel.innerHTML = models.length
      ? models.map(m => `<option value="${m.name}">${m.name}</option>`).join('')
      : '<option value="">No models — run: ollama pull llama3</option>';
    modelsLoaded = true;
  } catch {
    sel.innerHTML = '<option value="">Ollama offline</option>';
  }
}

function toggleChat() {
  panelOpen = !panelOpen;
  document.getElementById('chat-panel').classList.toggle('open', panelOpen);
  const fab = document.getElementById('chat-fab');
  if (panelOpen) {
    fab.style.background = 'var(--hi)';
    unreadCount = 0;
    document.getElementById('fab-badge').classList.remove('show');
    loadModels();
    setTimeout(() => document.getElementById('chat-input').focus(), 220);
    // Hide suggestions once chat has history
    if (chatHistory.length > 0) {
      document.getElementById('chat-suggestions').style.display = 'none';
    }
  } else {
    fab.style.background = 'var(--accent)';
  }
}

function openChatFromCard() {
  window.open('/chat', '_blank');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Configure marked once with a custom link renderer that opens all links in a new tab
(function() {
  if (typeof marked === 'undefined') return;
  const renderer = new marked.Renderer();
  renderer.link = function({ href, title, tokens }) {
    const text = this.parser.parseInline(tokens);
    const t = title ? ` title="${title}"` : '';
    return `<a href="${href}" target="_blank" rel="noopener"${t}>${text}</a>`;
  };
  marked.setOptions({ breaks: true, gfm: true, renderer });
})();

function renderMd(text) {
  if (typeof marked !== 'undefined') {
    return marked.parse(text);
  }
  // Fallback: auto-link bare URLs
  return esc(text)
    .replace(/(https?:\/\/[^\s<>"]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>')
    .replace(/\n/g, '<br>');
}

function appendMsg(role, text, isTyping = false) {
  const msgs = document.getElementById('chat-messages');
  const div  = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'user' : 'ai');
  const label = role === 'user' ? 'YOU' : 'SVRN AI';
  if (isTyping) {
    div.innerHTML = `<div class="msg-label">${label}</div>
      <div class="msg-bubble"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>`;
  } else {
    const content = role === 'user'
      ? `<div class="msg-bubble">${esc(text)}</div>`
      : `<div class="msg-bubble">${renderMd(text)}</div>`;
    div.innerHTML = `<div class="msg-label">${label}</div>${content}`;
  }
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div.querySelector('.msg-bubble');
}

function sendSuggestion(btn) {
  document.getElementById('chat-input').value = btn.textContent;
  document.getElementById('chat-suggestions').style.display = 'none';
  sendChat();
}

async function sendChat() {
  if (streaming) return;
  const input = document.getElementById('chat-input');
  const text  = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';

  document.getElementById('chat-suggestions').style.display = 'none';
  chatHistory.push({ role: 'user', content: text });
  appendMsg('user', text);

  streaming = true;
  document.getElementById('send-btn').disabled = true;

  // Show typing indicator
  const typingDiv = document.getElementById('chat-messages').lastElementChild;
  const typingBubble = appendMsg('ai', '', true);
  let full = '';

  try {
    const model = document.getElementById('model-select').value;
    if (!model) throw new Error('No model selected — is Ollama running?');

    const systemPrompt = buildSystemPrompt();
    const messages = [
      { role: 'system', content: systemPrompt },
      ...chatHistory.slice(-20), // keep last 20 turns for context
    ];

    const resp = await fetch('http://localhost:11434/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model, messages, stream: true }),
    });

    const reader = resp.body.getReader();
    const dec    = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      dec.decode(value).split('\n').filter(Boolean).forEach(line => {
        try {
          const chunk = JSON.parse(line).message?.content || '';
          full += chunk;
          typingBubble.innerHTML = renderMd(full);
          document.getElementById('chat-messages').scrollTop = 1e9;
        } catch {}
      });
    }

    chatHistory.push({ role: 'assistant', content: full });

    // Unread badge if panel is closed
    if (!panelOpen) {
      unreadCount++;
      const badge = document.getElementById('fab-badge');
      badge.textContent = unreadCount > 9 ? '9+' : unreadCount;
      badge.classList.add('show');
    }

  } catch (e) {
    typingBubble.innerHTML = `<span style="color:var(--red)">⚠ ${esc(e.message)}</span>`;
  }

  streaming = false;
  document.getElementById('send-btn').disabled = false;
}

// Auto-resize textarea
document.getElementById('chat-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
});

// Close panel on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && panelOpen) toggleChat();
});

buildGrid();
pollStatus();
pollSystem();
setInterval(pollStatus, 10000);
setInterval(pollSystem, 15000);
</script>
